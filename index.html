<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>hazels portfolio</title>
    <style>
        * {
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        body {
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:linear-gradient(145deg, #f5f7fa 0%, #e9edf2 100%);
            }
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card{
            background-color: #fff;
            max-width: 750px;
            width: 100%;
            border-radius: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            padding: 40px 35px;
            transition: all 0.3s ease;
            text-align: center;
        }
        .photo-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .photo-placeholder {
            font-size: 24px;
            color: #aaa;
            font-weight: bold;
            background-color: #f0f0f0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 2.5rem;
            color: #333;    
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .subhead {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            display: inline-block;
        }
        .desc {
            font-size: 1.2rem;
            color: #555;
            line-height: 1.6;
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid #ccc;
        }
        .description {
            font-size: 1rem;
            color: #777;
            line-height: 1.5;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        .
        
</head>
<body>
    <div Class="container">
        <h1>Hazels portifolio</h1>
        <h2>School project</h2>

        <p>
            Hello, my name is Hazel, a curious and creative student who enjoys learning new things.
            </p>
            <p>
                My favourite subjects are Front end web development and database and i hope to become a web developer in the future.
                </p>
                <p>
                    This website was created as part of my scholl project and thank you for viditing my website. Feel free to explore and learn more about me.
                    </p>

    </div>


    
</body>
</html>
